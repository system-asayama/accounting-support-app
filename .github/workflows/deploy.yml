name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          envs: GITHUB_TOKEN
          script: |
            PREV_SHA="$(cd ~/apps/accounting-support-app 2>/dev/null && git rev-parse HEAD 2>/dev/null || true)" && echo "[DEBUG] target_dir=~/apps/accounting-support-app" && echo "[DEBUG] full_name=system-asayama/accounting-support-app" && echo "[DEBUG] branch=main" && echo "[DEBUG] deploy_mode=docker-compose" && echo "[DEBUG] hostname=$(hostname)" && echo "[DEBUG] whoami=$(whoami)" && echo "[DEBUG] git --version: $(git --version 2>&1)" && echo "[DEBUG] docker --version: $(docker --version 2>&1)" && echo "[DEBUG] docker compose version: $(docker compose version 2>&1)" && echo "[DEBUG] dir exists? $(test -d ~/apps/accounting-support-app && echo YES || echo NO)" && echo "[DEBUG] .git exists? $(test -d ~/apps/accounting-support-app/.git && echo YES || echo NO)" && if [ -d ~/apps/accounting-support-app/.git ]; then echo "[DEBUG] taking git pull path" && cd ~/apps/accounting-support-app && git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/accounting-support-app.git && echo "[DEBUG] git remote URL updated" && git fetch origin main && echo "[DEBUG] git fetch origin main OK" && git checkout -B main origin/main && echo "[DEBUG] checkout & reset to origin/main OK" && echo "[DEBUG] git pull OK"; else echo "[DEBUG] taking git clone path" && mkdir -p "$(dirname ~/apps/accounting-support-app)" && rm -rf ~/apps/accounting-support-app && git clone --branch main https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/accounting-support-app.git ~/apps/accounting-support-app && echo "[DEBUG] git clone OK"; fi && echo "[DEBUG] post-pull, ls ~/apps/accounting-support-app:" && ls -la ~/apps/accounting-support-app | head -20 && cd ~/apps/accounting-support-app && echo "[DEBUG] in ~/apps/accounting-support-app, WEB_PORT=8005" && echo "[DEBUG] compose files:" && ls -la docker-compose* compose* 2>/dev/null && echo "[DEBUG] git HEAD: $(git rev-parse --short HEAD 2>/dev/null || echo no-git)" && echo "[DEBUG] pulling base images for dependent services..." && WEB_PORT=8005 docker compose pull 2>/dev/null || true; echo "[DEBUG] building web image with --no-cache --pull (= 新コード確実反映)..." && WEB_PORT=8005 docker compose build --pull --no-cache web && echo "[DEBUG] starting containers with --force-recreate..." && WEB_PORT=8005 docker compose up -d --force-recreate --remove-orphans && echo "[DEBUG] docker ps:" && docker ps --filter "label=com.docker.compose.project" --format "{{.Names}}\t{{.Status}}\t{{.Ports}}" && ( if ! command -v curl >/dev/null 2>&1; then echo "[DEPLOY] curl が無いためヘルスチェックをスキップ"; exit 0; fi; echo "[DEPLOY] ヘルスチェック http://127.0.0.1:8005/ ..."; HC=000; for i in 1 2 3 4 5 6; do sleep 5; HC=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8005/ 2>/dev/null || echo 000); echo "[DEPLOY] try $i: HTTP $HC"; case "$HC" in 2*|3*|4*) break;; esac; done; case "$HC" in 2*|3*|4*) echo "[DEPLOY] OK 正常応答 (HTTP $HC)";; *) echo "[DEPLOY] NG 異常 (HTTP $HC)。直前のコミットへロールバックします。"; if [ -n "$PREV_SHA" ]; then cd ~/apps/accounting-support-app && git checkout -B main "$PREV_SHA" && cd ~/apps/accounting-support-app && WEB_PORT=8005 docker compose up -d --force-recreate --build web && echo "[DEPLOY] rolled back to $PREV_SHA"; else echo "[DEPLOY] 初回デプロイのため戻す先がありません"; fi; exit 1;; esac )
