services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/easy_login_system_app
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FREEE_CLIENT_ID: ${FREEE_CLIENT_ID:-}
      FREEE_CLIENT_SECRET: ${FREEE_CLIENT_SECRET:-}
      FREEE_REDIRECT_URI: ${FREEE_REDIRECT_URI:-}
    depends_on:
      - db
    restart: unless-stopped
  mcp:
    build: .
    command: python mcp_server.py
    ports:
      - "${MCP_PORT:-8001}:8001"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/easy_login_system_app
      MCP_TRANSPORT: http
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8001"
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: easy_login_system_app
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  db_data:
